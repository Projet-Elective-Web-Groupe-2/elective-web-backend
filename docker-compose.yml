version: '3'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongoDB
      - mySQL
    environment:
      MONGODB_URI: ${MONGODB_URI}
    stdin_open: true
    tty: true
    networks:
      - frontend
      - databases

  mongoDB:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - ./volumes/mongodb:/data/database
    networks:
      - databases
  
  mySQL:
    image: mysql
    ports:
      - "3336:3336"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    networks:
      - databases

networks:
  frontend:
    external: true
  databases:
    driver: bridge