version: '3'

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongoDB
      - mySQL
    environment:
      MONGODB_URI: ${MONGODB_URI}
    stdin_open: true
    tty: true
    networks:
      - frontend
      - databases

  mongoDB:
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - ./volumes/mongodb:/data/database
    networks:
      - databases
  
  mySQL:
    image: mysql:latest
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: test_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_HOST: '%'
      MYSQL_ALLOW_EMPTY_PASSWORD: true
    networks:
      - databases

networks:
  frontend:
    external: true
  databases:
    driver: bridge